<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> 3D Animado</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            overflow: hidden;
        }

        .container {
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        #canvas-container {
            width: 100%;
            height: 100vh;
            position: relative;
        }

        .controls {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 15px;
            z-index: 10;
        }

        .btn {
            padding: 12px 24px;
            background: linear-gradient(45deg, #e94560, #ff6b6b);
            border: none;
            border-radius: 25px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(132, 9, 226, 0.867);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(233, 69, 96, 0.6);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn.active {
            background: linear-gradient(45deg, #00d9ff, #00ff88);
            box-shadow: 0 4px 15px rgba(0, 217, 255, 0.4);
        }

        .title {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            font-size: 28px;
            font-weight: 700;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5);
            z-index: 10;
        }

        .loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 20px;
            z-index: 5;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid rgba(255, 255, 255, 0.3);
            border-top: 5px solid #e94560;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .info {
            position: absolute;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
            text-align: center;
            z-index: 10;
        }

        .logo-container {
            position: absolute;
            top: 30px;
            right: 30px;
            z-index: 10;
            animation: float 3s ease-in-out infinite;
        }

        .logo {
            width: 120px;
            height: 120px;
            object-fit: contain;
            filter: drop-shadow(0 4px 15px rgba(233, 69, 96, 0.5));
            border-radius: 15px;
            background: rgba(255, 255, 255, 0.1);
            padding: 10px;
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0px);
            }
            50% {
                transform: translateY(-15px);
            }
        }

        .camera-info {
            position: absolute;
            top: 30px;
            left: 30px;
            color: rgba(255, 255, 255, 0.6);
            font-size: 12px;
            z-index: 10;
            background: rgba(0, 0, 0, 0.3);
            padding: 10px 15px;
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="title">🎮  es feliz por que reciclas</h1>
        
        <div id="canvas-container">
            <div class="logo-container">
                <img src="./sinba.png" alt="Logo" class="logo" id="logo">
            </div>
            
            <div class="camera-info">
                🖱️ Arrastra para rotar | Rueda para zoom | Click derecho para mover
            </div>
            
            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p>Cargando a  en 3d...</p>
            </div>
        </div>

        <div class="controls">
            <button class="btn active" id="btn-move">Mover</button>
            <button class="btn" id="btn-jump">Saltar</button>
            <button class="btn" id="btn-both">Ambos</button>
            <button class="btn" id="btn-stop">Detener</button>
        </div>

        <p class="info">El saltará automáticamente</p>
    </div>

    <script>
        let scene, camera, renderer, model, controls;
        let isMoving = true;
        let isJumping = true;
        let moveDirection = 1;
        let jumpHeight = 0;
        let jumpVelocity = 0;
        const gravity = -0.025;
        const jumpForce = 0.55;
        const moveSpeed = 0.04;
        const moveRange = 6;
        const groundLevel = 0;
        let modelBaseY = 0;

        function init() {
            const container = document.getElementById('canvas-container');
            
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x1a1a2e);
            scene.fog = new THREE.Fog(0x1a1a2e, 15, 60);

            camera = new THREE.PerspectiveCamera(
                75,
                container.clientWidth / container.clientHeight,
                0.1,
                1000
            );
            camera.position.set(0, 5, 15);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(container.clientWidth, container.clientHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            container.appendChild(renderer.domElement);

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.minDistance = 5;
            controls.maxDistance = 30;
            controls.maxPolarAngle = Math.PI / 2.2;
            controls.target.set(0, 2, 0);

            const ambientLight = new THREE.AmbientLight(0xffffff, 0.7);
            scene.add(ambientLight);

            const directionalLight = new THREE.DirectionalLight(0xffffff, 1);
            directionalLight.position.set(5, 10, 7);
            directionalLight.castShadow = true;
            directionalLight.shadow.mapSize.width = 2048;
            directionalLight.shadow.mapSize.height = 2048;
            scene.add(directionalLight);

            const pointLight1 = new THREE.PointLight(0xe94560, 0.6, 20);
            pointLight1.position.set(-8, 5, 5);
            scene.add(pointLight1);

            const pointLight2 = new THREE.PointLight(0x00d9ff, 0.6, 20);
            pointLight2.position.set(8, 5, 5);
            scene.add(pointLight2);

            const groundGeometry = new THREE.PlaneGeometry(50, 50);
            const groundMaterial = new THREE.MeshStandardMaterial({ 
                color: 0x2d3436,
                roughness: 0.8,
                metalness: 0.3
            });
            const ground = new THREE.Mesh(groundGeometry, groundMaterial);
            ground.rotation.x = -Math.PI / 2;
            ground.position.y = groundLevel;
            ground.receiveShadow = true;
            scene.add(ground);

            const gridHelper = new THREE.GridHelper(50, 50, 0x444444, 0x222222);
            gridHelper.position.y = groundLevel + 0.01;
            scene.add(gridHelper);

            loadModel();
            animate();

            window.addEventListener('resize', onWindowResize);
        }

        function loadModel() {
            const loader = new THREE.GLTFLoader();
            
            loader.load(
                './mascota.png',
                (gltf) => {
                    model = gltf.scene;
                    
                    const box = new THREE.Box3().setFromObject(model);
                    const modelHeight = box.max.y - box.min.y;
                    
                    model.scale.set(4, 4, 4);
                    
                    const newBox = new THREE.Box3().setFromObject(model);
                    const newHeight = newBox.max.y - newBox.min.y;
                    
                    modelBaseY = groundLevel + newHeight / 2;
                    model.position.set(0, modelBaseY, 0);
                    
                    model.traverse((child) => {
                        if (child.isMesh) {
                            child.castShadow = true;
                            child.receiveShadow = true;
                        }
                    });
                    
                    scene.add(model);
                    
                    document.getElementById('loading').style.display = 'none';
                    console.log('Modelo mascota.png cargado exitosamente');
                },
                (xhr) => {
                    const percent = (xhr.loaded / xhr.total * 100).toFixed(0);
                    document.querySelector('#loading p').textContent = `Cargando mascota.png : ${percent}%`;
                },
                (error) => {
                    console.error('Error cargando mascota.png:', error);
                    document.querySelector('#loading p').textContent = 'Error: No se encontró mascota.png';
                    document.querySelector('#loading p').style.color = '#ff6b6b';
                    
                    const placeholderGeometry = new THREE.CapsuleGeometry(0.5, 1.5, 4, 8);
                    const placeholderMaterial = new THREE.MeshStandardMaterial({ 
                        color: 0xe94560,
                        metalness: 0.5,
                        roughness: 0.3
                    });
                    model = new THREE.Mesh(placeholderGeometry, placeholderMaterial);
                    model.position.set(0, 1, 0);
                    model.castShadow = true;
                    modelBaseY = 1;
                    scene.add(model);
                    document.getElementById('loading').style.display = 'none';
                }
            );
        }

        function animate() {
            requestAnimationFrame(animate);

            controls.update();

            if (model && isMoving) {
                model.position.x += moveSpeed * moveDirection;
                
                if (model.position.x >= moveRange) {
                    moveDirection = -1;
                    model.rotation.y = Math.PI;
                } else if (model.position.x <= -moveRange) {
                    moveDirection = 1;
                    model.rotation.y = 0;
                }
            }

            if (model && isJumping) {
                jumpVelocity += gravity;
                jumpHeight += jumpVelocity;

                if (jumpHeight <= 0) {
                    jumpHeight = 0;
                    jumpVelocity = jumpForce;
                }

                model.position.y = modelBaseY + jumpHeight;
            }

            if (model && !isJumping) {
                model.position.y = modelBaseY;
                jumpVelocity = 0;
                jumpHeight = 0;
            }

            renderer.render(scene, camera);
        }

        function onWindowResize() {
            const container = document.getElementById('canvas-container');
            camera.aspect = container.clientWidth / container.clientHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(container.clientWidth, container.clientHeight);
        }

        document.getElementById('btn-move').addEventListener('click', function() {
            isMoving = !isMoving;
            isJumping = false;
            updateButtons(this);
        });

        document.getElementById('btn-jump').addEventListener('click', function() {
            isJumping = !isJumping;
            isMoving = false;
            updateButtons(this);
        });

        document.getElementById('btn-both').addEventListener('click', function() {
            isMoving = true;
            isJumping = true;
            updateButtons(this);
        });

        document.getElementById('btn-stop').addEventListener('click', function() {
            isMoving = false;
            isJumping = false;
            if (model) {
                model.position.y = modelBaseY;
                jumpVelocity = 0;
                jumpHeight = 0;
            }
            updateButtons(this);
        });

        function updateButtons(activeBtn) {
            document.querySelectorAll('.btn').forEach(btn => {
                btn.classList.remove('active');
            });
            activeBtn.classList.add('active');
        }

        const logo = document.getElementById('logo');
        logo.onerror = function() {
            this.style.display = 'none';
            console.log('logo.png no encontrado');
        };

        init();
    </script>
</body>
</html>
